
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target $750</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-17ZJNVGZ7F"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-17ZJNVGZ7F');

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#efebe7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:560px;
    border-radius:28px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.top{
    background:#e10012;
    color:#fff;
    text-align:center;
    padding:40px 20px 55px;
}

.logo{
    width:82px;
    height:82px;
    border:8px solid #fff;
    border-radius:50%;
    margin:0 auto 20px;
    position:relative;
}

.logo::before{
    content:"";
    position:absolute;
    inset:13px;
    border:8px solid #fff;
    border-radius:50%;
}

.logo::after{
    content:"";
    width:18px;
    height:18px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.amount{
    font-size:84px;
    font-weight:800;
    line-height:1;
}

.subtitle{
    margin-top:12px;
    font-size:20px;
    text-transform:uppercase;
}

.content{
    background:#f3f3f3;
    padding:35px 28px 40px;
    border-radius:32px 32px 0 0;
    margin-top:-22px;
}

.step{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:22px;
}

.number{
    min-width:52px;
    width:52px;
    height:52px;
    background:#e10012;
    color:#fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
}

.step-text{
    font-size:18px;
    color:#223a63;
    font-weight:500;
}

.btn{
    width:100%;
    margin-top:25px;
    border:none;
    background:#e10012;
    color:#fff;
    font-size:22px;
    font-weight:700;
    padding:18px;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

@media (max-width:600px){

    .card{
        max-width:100%;
    }

    .top{
        padding:30px 15px 45px;
    }

    .logo{
        width:70px;
        height:70px;
    }

    .amount{
        font-size:58px;
    }

    .subtitle{
        font-size:16px;
    }

    .content{
        padding:25px 18px 30px;
    }

    .number{
        width:45px;
        height:45px;
        min-width:45px;
        font-size:22px;
    }

    .step-text{
        font-size:16px;
    }

    .btn{
        font-size:18px;
        padding:16px;
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="top">
        <div class="logo"></div>

        <div class="amount">$1000</div>

        <div class="subtitle">
            TARGET REWARD
        </div>
    </div>

    <div class="content">

        <div class="step">
            <div class="number">1</div>
            <div class="step-text">Click The Button Below</div>
        </div>

        <div class="step">
            <div class="number">2</div>
            <div class="step-text">Enter Your Basic Info</div>
        </div>

      

        <div class="step">
            <div class="number">3</div>
            <div class="step-text">Claim Your Reward</div>
        </div>

        <button class="btn"
        onclick="window.location.href='https://www.af9m8trk.com/SXS12G8E/KC312MD1/'">
            CLAIM
        </button>

    </div>

</div>

</body>
</html>
