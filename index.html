<!DOCTYPE html>

<head>

<title>Cashtag Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* loader screen */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* dots */
.dots{
display:flex;
gap:10px;
}

.dots span{
width:12px;
height:12px;
background:#18c45a;
border-radius:50%;
animation: bounce 1s infinite;
}

.dots span:nth-child(2){
animation-delay:0.2s;
}

.dots span:nth-child(3){
animation-delay:0.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0);
}
40%{
transform:scale(1);
}
}

/* main body */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#a9c0d8,#cbd9e8);
}

/* card */
.card{
background:white;
width:90%;
max-width:420px;
padding:40px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.title{
color:#12c05a;
font-size:28px;
font-weight:700;
margin-bottom:30px;
}

.input-wrapper{
position:relative;
margin-bottom:25px;
}

.dollar{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
font-size:18px;
color:#18c45a;
font-weight:bold;
}

.input-box{
width:100%;
padding:16px 16px 16px 34px;
border:2px solid #18c45a;
border-radius:10px;
font-size:16px;
outline:none;
}

.btn{
width:100%;
padding:16px;
border:none;
background:#18c45a;
color:white;
font-size:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#12a84d;
}

.error{
color:red;
font-size:14px;
margin-bottom:15px;
display:none;
}

</style>

<span class="dollar">$</span>
<input id="cashtag" class="input-box" type="text" placeholder="Cashtag">

<script>

window.onload = function(){
document.getElementById("loader").style.display="none";
}

function submitForm(){

let cashtag = document.getElementById("cashtag").value.trim();
let error = document.getElementById("error");

let regex = /^[A-Za-z0-9]{3,}$/;

if(!regex.test(cashtag)){
error.style.display = "block";
return;
}

error.style.display = "none";

alert("Your Cashtag: $" + cashtag);

}

</script>
